    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #373B65;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Subtle geometric pattern overlay */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(245, 176, 107, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(205, 205, 216, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(245, 176, 107, 0.02) 0%, transparent 50%);
            pointer-events: none;
        }

        /* Animated floating shapes */
        .shapes {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .shape {
            position: absolute;
            opacity: 0.1;
            animation: float 20s infinite ease-in-out;
        }

        .shape-1 {
            width: 80px;
            height: 80px;
            border: 3px solid #F5B06B;
            border-radius: 50%;
            top: 10%;
            left: 10%;
            animation-delay: 0s;
        }

        .shape-2 {
            width: 120px;
            height: 120px;
            border: 2px solid #CDCDD8;
            transform: rotate(45deg);
            top: 60%;
            right: 10%;
            animation-delay: 5s;
        }

        .shape-3 {
            width: 60px;
            height: 60px;
            background: #F5B06B;
            border-radius: 50%;
            bottom: 20%;
            left: 20%;
            animation-delay: 10s;
        }

        .shape-4 {
            width: 100px;
            height: 100px;
            border: 2px solid #CDCDD8;
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            top: 30%;
            right: 20%;
            animation-delay: 15s;
        }

        @keyframes float {
            0%, 100% {
                transform: translate(0, 0) rotate(0deg);
            }
            25% {
                transform: translate(20px, -30px) rotate(90deg);
            }
            50% {
                transform: translate(-10px, 20px) rotate(180deg);
            }
            75% {
                transform: translate(30px, 10px) rotate(270deg);
            }
        }

        .container {
            text-align: center;
            z-index: 1;
            padding: 2rem;
            max-width: 800px;
            position: relative;
        }

        .error-code {
            font-size: clamp(8rem, 20vw, 12rem);
            font-weight: 900;
            color: #CDCDD8;
            line-height: 1;
            margin-bottom: 0.5rem;
            position: relative;
            display: inline-block;
            letter-spacing: -5px;
        }

        .error-code::after {
            content: '404';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            color: transparent;
            -webkit-text-stroke: 2px #F5B06B;
            opacity: 0.3;
            transform: translate(5px, 5px);
            z-index: -1;
        }

        .error-title {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            color: #F5B06B;
            margin-bottom: 1.5rem;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .divider {
            width: 80px;
            height: 4px;
            background: linear-gradient(90deg, #F5B06B, transparent);
            margin: 0 auto 2rem auto;
            border-radius: 2px;
        }

        .error-message {
            font-size: clamp(1rem, 2vw, 1.25rem);
            color: #CDCDD8;
            margin-bottom: 3rem;
            line-height: 1.8;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
            opacity: 0.9;
        }

        .button-group {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 1rem 2.5rem;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
        }

        .btn-primary {
            background: #F5B06B;
            color: #373B65;
            box-shadow: 0 4px 15px rgba(245, 176, 107, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(245, 176, 107, 0.4);
            background: #ffbc7d;
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: transparent;
            color: #CDCDD8;
            border: 2px solid #CDCDD8;
        }

        .btn-secondary:hover {
            background: rgba(205, 205, 216, 0.1);
            border-color: #F5B06B;
            color: #F5B06B;
            transform: translateY(-2px);
        }

        .icon {
            width: 18px;
            height: 18px;
            transition: transform 0.3s ease;
        }

        .btn:hover .icon-home {
            transform: translateX(-3px);
        }

        .btn:hover .icon-back {
            transform: translateX(-3px);
        }

        /* Decorative corner elements */
        .corner {
            position: absolute;
            width: 60px;
            height: 60px;
            border: 2px solid rgba(245, 176, 107, 0.2);
        }

        .corner-tl {
            top: 40px;
            left: 40px;
            border-right: none;
            border-bottom: none;
        }

        .corner-br {
            bottom: 40px;
            right: 40px;
            border-left: none;
            border-top: none;
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .container {
                padding: 1.5rem;
            }
            
            .button-group {
                flex-direction: column;
                width: 100%;
                gap: 1rem;
            }
            
            .btn {
                width: 100%;
                justify-content: center;
            }

            .corner {
                width: 40px;
                height: 40px;
            }

            .corner-tl {
                top: 20px;
                left: 20px;
            }

            .corner-br {
                bottom: 20px;
                right: 20px;
            }
        }

        /* Subtle glow animation for 404 */
        @keyframes glow {
            0%, 100% {
                text-shadow: 0 0 20px rgba(245, 176, 107, 0.1);
            }
            50% {
                text-shadow: 0 0 30px rgba(245, 176, 107, 0.2);
            }
        }

        .error-code {
            animation: glow 3s ease-in-out infinite;
        }
    </style>
